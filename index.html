<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>✨ חשבון קסם ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --purple: #8b5cf6;
      --pink: #ec4899;
      --yellow: #fbbf24;
      --teal: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
    }

    html, body {
      min-height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #1a0533;
      overflow-x: hidden;
    }

    /* ========== ANIMATED BACKGROUND ========== */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== APP WRAPPER ========== */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 14px 40px;
    }

    /* ========== FLOATING EMOJIS ========== */
    .floatie {
      position: fixed;
      font-size: 24px;
      pointer-events: none;
      z-index: 0;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(0.7); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; }
    }

    /* ========== HEADER ========== */
    .app-header {
      text-align: center;
      margin-bottom: 18px;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 8vw, 2.8rem);
      color: #fff;
      text-shadow:
        0 0 20px #f0abfc,
        0 0 40px #a855f7,
        3px 3px 0 #7c3aed;
      animation: titlePulse 2s ease-in-out infinite;
      line-height: 1.1;
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px #f0abfc, 0 0 40px #a855f7, 3px 3px 0 #7c3aed; }
      50%       { text-shadow: 0 0 30px #f9a8d4, 0 0 60px #ec4899, 3px 3px 0 #db2777; }
    }
    .subtitle {
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      color: #e9d5ff;
      font-weight: 800;
      margin-top: 4px;
      text-shadow: 0 0 10px #a855f7;
    }

    /* ========== MENU GRID ========== */
    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }

    .op-btn {
      border: none;
      border-radius: 24px;
      padding: clamp(18px, 5vw, 26px) 10px;
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      position: relative; overflow: hidden;
      border: 3px solid rgba(255,255,255,0.3);
    }
    .op-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .op-btn:hover::before, .op-btn:active::before { opacity: 1; }
    .op-btn:hover  { transform: translateY(-5px) scale(1.03); }
    .op-btn:active { transform: scale(0.95); }

    .op-icon { font-size: clamp(2rem, 8vw, 2.8rem); filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    .op-name { font-size: clamp(1.1rem, 5vw, 1.5rem); color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .op-label { font-size: clamp(0.65rem, 2.5vw, 0.8rem); font-family: 'Nunito', sans-serif; font-weight: 800; color: rgba(255,255,255,0.85); }

    .btn-add { background: linear-gradient(135deg, #f472b6 0%, #ec4899 50%, #db2777 100%); box-shadow: 0 8px 0 #9d174d, 0 12px 20px rgba(236,72,153,0.5); }
    .btn-sub { background: linear-gradient(135deg, #67e8f9 0%, #22d3ee 50%, #06b6d4 100%); box-shadow: 0 8px 0 #0e7490, 0 12px 20px rgba(6,182,212,0.5); }
    .btn-mul { background: linear-gradient(135deg, #fde68a 0%, #fbbf24 50%, #f59e0b 100%); box-shadow: 0 8px 0 #b45309, 0 12px 20px rgba(245,158,11,0.5); }
    .btn-div { background: linear-gradient(135deg, #6ee7b7 0%, #34d399 50%, #10b981 100%); box-shadow: 0 8px 0 #065f46, 0 12px 20px rgba(16,185,129,0.5); }

    .btn-add:hover { box-shadow: 0 12px 0 #9d174d, 0 16px 30px rgba(236,72,153,0.6); }
    .btn-sub:hover { box-shadow: 0 12px 0 #0e7490, 0 16px 30px rgba(6,182,212,0.6); }
    .btn-mul:hover { box-shadow: 0 12px 0 #b45309, 0 16px 30px rgba(245,158,11,0.6); }
    .btn-div:hover { box-shadow: 0 12px 0 #065f46, 0 16px 30px rgba(16,185,129,0.6); }

    /* ========== GAME SECTION ========== */
    .screen { display: none; width: 100%; max-width: 440px; flex-direction: column; align-items: center; gap: 14px; }
    .screen.active { display: flex; animation: screenIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes screenIn { from { opacity: 0; transform: scale(0.8) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; gap: 10px;
    }
    .back-btn {
      border: 2.5px solid rgba(255,255,255,0.4);
      border-radius: 14px;
      padding: 8px 16px;
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      background: rgba(255,255,255,0.15);
      color: white;
      backdrop-filter: blur(8px);
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    .back-btn:active { transform: scale(0.95); }

    .score-live-badge {
      background: linear-gradient(135deg, #fde68a, #fbbf24);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: #78350f;
      box-shadow: 0 4px 0 #92400e;
      white-space: nowrap;
    }

    .progress-wrap { width: 100%; }
    .progress-label-row {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; color: #e9d5ff; font-weight: 800; margin-bottom: 6px;
    }
    .progress-track {
      width: 100%; height: 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #ec4899, #f9a8d4);
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute; right: 0; top: 0;
      width: 20px; height: 100%;
      background: rgba(255,255,255,0.5);
      border-radius: 99px;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:0.3} 50%{opacity:1} }

    .question-card {
      width: 100%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: clamp(20px, 6vw, 32px) 20px;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative; overflow: hidden;
    }
    .question-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(168,85,247,0.15) 0%, transparent 60%);
      animation: cardGlow 3s ease-in-out infinite;
    }
    @keyframes cardGlow { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 11vw, 3.5rem);
      color: white;
      text-shadow: 0 0 30px rgba(168,85,247,0.8), 0 4px 8px rgba(0,0,0,0.4);
      position: relative; z-index: 1;
      animation: questionPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
      direction: ltr;
      unicode-bidi: bidi-override;
    }
    @keyframes questionPop { from{transform:scale(0.5) rotate(-5deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }

    .answer-row { display: flex; gap: 10px; width: 100%; align-items: center; }
    .answer-input {
      flex: 1;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 7vw, 2.5rem);
      text-align: center;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 12px;
      color: white;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .answer-input::placeholder { color: rgba(255,255,255,0.4); }
    .answer-input:focus {
      border-color: #f0abfc;
      box-shadow: 0 0 0 4px rgba(168,85,247,0.4);
    }
    /* Remove number input arrows */
    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .submit-btn {
      border: none;
      border-radius: 20px;
      padding: 14px 20px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      cursor: pointer;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: white;
      box-shadow: 0 6px 0 #7c3aed, 0 10px 20px rgba(168,85,247,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
      min-width: 60px;
    }
    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #7c3aed, 0 14px 25px rgba(168,85,247,0.6); }
    .submit-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #7c3aed; }

    /* ========== NUMPAD (for iPhone — avoids keyboard overlap) ========== */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      direction: ltr;
    }
    .np-btn {
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      cursor: pointer;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 2px solid rgba(255,255,255,0.2);
      transition: transform 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .np-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
    .np-btn.np-del { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.4); }
    .np-btn.np-ok  { background: linear-gradient(135deg, #a855f7, #ec4899); border-color: transparent; box-shadow: 0 4px 0 #7c3aed; grid-column: span 3; }
    .np-btn.np-ok:active { transform: scale(0.97) translateY(2px); box-shadow: 0 2px 0 #7c3aed; }

    /* ========== FEEDBACK OVERLAY ========== */
    .fb-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .fb-overlay.show { opacity: 1; }

    .fb-bubble {
      border-radius: 32px;
      padding: 28px 36px;
      text-align: center;
      font-family: 'Fredoka One', cursive;
      animation: bubblePop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      max-width: 300px; width: 90%;
    }
    .fb-bubble.correct { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border: 3px solid #34d399; }
    .fb-bubble.wrong   { background: linear-gradient(135deg, #fee2e2, #fecaca); border: 3px solid #f87171; }
    @keyframes bubblePop { from{transform:scale(0.2) rotate(-15deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }

    .fb-icon { font-size: 4rem; display: block; animation: iconBounce 0.5s ease infinite alternate; }
    @keyframes iconBounce { from{transform:translateY(0) scale(1)} to{transform:translateY(-10px) scale(1.1)} }
    .fb-main { font-size: 1.7rem; margin: 8px 0 4px; }
    .fb-bubble.correct .fb-main { color: #065f46; }
    .fb-bubble.wrong   .fb-main { color: #7f1d1d; }
    .fb-sub { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem; }
    .fb-bubble.correct .fb-sub { color: #064e3b; }
    .fb-bubble.wrong   .fb-sub { color: #991b1b; }

    /* ========== PARTICLES ========== */
    .confetti { position: fixed; pointer-events: none; z-index: 250; border-radius: 3px; animation: confFall linear forwards; }
    @keyframes confFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .spark { position: fixed; pointer-events: none; z-index: 260; font-size: 1.8rem; animation: sparkFly 1s forwards cubic-bezier(0.2,0.8,0.5,1); }
    @keyframes sparkFly {
      0%   { transform: translate(0,0) scale(1.2); opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
    }

    /* ========== SCORE SCREEN ========== */
    .trophy-box {
      background: linear-gradient(135deg, rgba(251,191,36,0.3), rgba(245,158,11,0.2));
      border: 3px solid rgba(251,191,36,0.5);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      width: 100%;
    }
    .trophy-icon { font-size: 4rem; animation: trophySpin 3s ease-in-out infinite; display: block; }
    @keyframes trophySpin { 0%,100%{transform:rotate(-5deg) scale(1)} 50%{transform:rotate(5deg) scale(1.1)} }
    .score-title { font-family: 'Fredoka One', cursive; font-size: clamp(1.5rem,6vw,2rem); color: white; text-shadow: 0 0 20px #fbbf24; }
    .score-num { font-family: 'Fredoka One', cursive; font-size: clamp(3.5rem,14vw,5rem); line-height: 1; }
    .score-msg { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: clamp(0.95rem,3.5vw,1.1rem); color: #e9d5ff; }

    .review-list { width: 100%; display: flex; flex-direction: column; gap: 7px; max-height: 280px; overflow-y: auto; }
    .review-list::-webkit-scrollbar { width: 6px; }
    .review-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 99px; }
    .review-list::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.5); border-radius: 99px; }

    .rv-item {
      display: flex; align-items: center; gap: 8px;
      border-radius: 14px; padding: 9px 14px;
      font-weight: 800; font-size: clamp(0.85rem,3.5vw,0.95rem);
      border: 2px solid transparent;
    }
    .rv-item.ok  { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.4); color: #d1fae5; }
    .rv-item.bad { background: rgba(239,68,68,0.2);  border-color: rgba(239,68,68,0.4);  color: #fee2e2; }
    .rv-q { flex: 1; }
    .rv-ans { font-family: 'Fredoka One', cursive; font-size: 1.1rem; }

    .big-btn {
      border: none; border-radius: 22px;
      padding: clamp(14px,4vw,18px) clamp(24px,8vw,40px);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem,5vw,1.5rem);
      cursor: pointer;
      width: 100%;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
    }
    .big-btn:active { transform: scale(0.96) translateY(2px); }
    .btn-again { background: linear-gradient(135deg, #a855f7, #ec4899); color: white; box-shadow: 0 7px 0 #7c3aed, 0 10px 25px rgba(168,85,247,0.5); }
    .btn-again:hover { transform: translateY(-4px); box-shadow: 0 11px 0 #7c3aed, 0 16px 30px rgba(168,85,247,0.6); }
    .btn-home  { background: rgba(255,255,255,0.15); color: white; border: 2px solid rgba(255,255,255,0.3); }
    .btn-home:hover { background: rgba(255,255,255,0.25); }

    /* ========== SHAKE ANIMATION ========== */
    @keyframes shakeIt {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-12px); }
      30%      { transform: translateX(12px); }
      45%      { transform: translateX(-8px); }
      60%      { transform: translateX(8px); }
      75%      { transform: translateX(-4px); }
      90%      { transform: translateX(4px); }
    }
    .shaking { animation: shakeIt 0.5s ease; }

    /* ========== STARS DECORATION ========== */
    .deco-star {
      position: fixed; pointer-events: none; z-index: 0;
      animation: decoTwinkle ease-in-out infinite;
      color: rgba(255,255,255,0.6);
    }
    @keyframes decoTwinkle { 0%,100%{opacity:0.2;transform:scale(0.8) rotate(0deg)} 50%{opacity:0.9;transform:scale(1.3) rotate(20deg)} }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="app">

  <!-- ========== MENU ========== -->
  <div id="menu-screen" class="screen active" style="gap:16px;">
    <div class="app-header">
      <h1>✨ חשבון קסם ✨</h1>
      <p class="subtitle">בחרי פעולה ונתחיל!</p>
    </div>
    <div class="menu">
      <button class="op-btn btn-add" onclick="startGame('add')">
        <span class="op-icon">➕</span>
        <span class="op-name">חיבור</span>
        <span class="op-label">עד 1,000</span>
      </button>
      <button class="op-btn btn-sub" onclick="startGame('sub')">
        <span class="op-icon">➖</span>
        <span class="op-name">חיסור</span>
        <span class="op-label">עד 1,000</span>
      </button>
      <button class="op-btn btn-mul" onclick="startGame('mul')">
        <span class="op-icon">✖️</span>
        <span class="op-name">כפל</span>
        <span class="op-label">לוח הכפל</span>
      </button>
      <button class="op-btn btn-div" onclick="startGame('div')">
        <span class="op-icon">➗</span>
        <span class="op-name">חילוק</span>
        <span class="op-label">חילוק שלם</span>
      </button>
    </div>
  </div>

  <!-- ========== GAME ========== -->
  <div id="game-screen" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="goHome()">← חזרה</button>
      <div class="score-live-badge">⭐ <span id="score-live">0</span></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label-row">
        <span id="q-label">שאלה 1 מתוך 10</span>
        <span id="q-pct">10%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:10%"></div>
      </div>
    </div>
    <div class="question-card" id="q-card">
      <div class="question-text" id="q-text">?</div>
    </div>
    <div class="answer-row">
      <input id="ans-input" class="answer-input" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="?" autocomplete="off" />
      <button class="submit-btn" onclick="checkAnswer()">✓</button>
    </div>
    <div class="numpad" style="direction:ltr;">
      <button class="np-btn" onclick="npPress('1')">1</button>
      <button class="np-btn" onclick="npPress('2')">2</button>
      <button class="np-btn" onclick="npPress('3')">3</button>
      <button class="np-btn" onclick="npPress('4')">4</button>
      <button class="np-btn" onclick="npPress('5')">5</button>
      <button class="np-btn" onclick="npPress('6')">6</button>
      <button class="np-btn" onclick="npPress('7')">7</button>
      <button class="np-btn" onclick="npPress('8')">8</button>
      <button class="np-btn" onclick="npPress('9')">9</button>
      <button class="np-btn np-del" onclick="npDel()">⌫</button>
      <button class="np-btn" onclick="npPress('0')">0</button>
      <button class="np-btn" onclick="checkAnswer()" style="font-size:1.2rem;background:rgba(168,85,247,0.4);border-color:rgba(168,85,247,0.5);">✓</button>
      <button class="np-btn np-ok" onclick="checkAnswer()">✨ בדקי!</button>
    </div>
  </div>

  <!-- ========== SCORE ========== -->
  <div id="score-screen" class="screen">
    <div class="trophy-box">
      <span class="trophy-icon" id="trophy-icon">🏆</span>
      <div class="score-title" id="score-title">כל הכבוד!</div>
      <div class="score-num" id="score-num" style="color:#fbbf24;text-shadow:0 0 30px #f59e0b;">10/10</div>
      <div class="score-msg" id="score-msg">מדהים!</div>
    </div>
    <div class="review-list" id="review-list"></div>
    <button class="big-btn btn-again" id="again-btn" onclick="playAgain()">עוד סיבוב! 🎉</button>
    <button class="big-btn btn-home" onclick="goHome()">← בחרי פעולה אחרת</button>
  </div>

</div>

<!-- ========== FEEDBACK ========== -->
<div class="fb-overlay" id="fb-overlay">
  <div class="fb-bubble" id="fb-bubble">
    <span class="fb-icon" id="fb-icon"></span>
    <div class="fb-main" id="fb-main"></div>
    <div class="fb-sub" id="fb-sub"></div>
  </div>
</div>

<script>
/* ===== BACKGROUND CANVAS ===== */
const canvas = document.getElementById('bg-canvas');
const cctx = canvas.getContext('2d');
let W, H, particles = [];

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initParticles() {
  particles = [];
  const colors = ['#c084fc','#f9a8d4','#67e8f9','#6ee7b7','#fde68a','#a5b4fc'];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      r: 1 + Math.random() * 2.5,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -0.2 - Math.random() * 0.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 0.3 + Math.random() * 0.5,
      pulse: Math.random() * Math.PI * 2
    });
  }
}
initParticles();

function drawBg() {
  cctx.clearRect(0, 0, W, H);
  const grad = cctx.createLinearGradient(0, 0, W, H);
  const t = Date.now() / 8000;
  grad.addColorStop(0, `hsl(${270 + Math.sin(t)*15}, 70%, 10%)`);
  grad.addColorStop(0.5, `hsl(${290 + Math.cos(t)*10}, 60%, 8%)`);
  grad.addColorStop(1, `hsl(${260 + Math.sin(t*1.3)*20}, 65%, 12%)`);
  cctx.fillStyle = grad;
  cctx.fillRect(0, 0, W, H);

  const now = Date.now() / 1000;
  particles.forEach(p => {
    p.pulse += 0.02;
    const alpha = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
    cctx.beginPath();
    cctx.arc(p.x, p.y, p.r * (1 + 0.3 * Math.sin(p.pulse)), 0, Math.PI * 2);
    cctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2,'0');
    cctx.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
  });
  requestAnimationFrame(drawBg);
}
drawBg();

/* ===== FLOATING EMOJIS ===== */
const floatEmojis = ['⭐','✨','💖','🦄','🌈','🎀','💫','🌟','🍭','🦋','🌸','💎'];
function spawnFloatie() {
  const el = document.createElement('div');
  el.className = 'floatie';
  el.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
  const size = 16 + Math.random() * 20;
  el.style.cssText = `left:${Math.random()*95}vw;bottom:-30px;font-size:${size}px;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*2}s;z-index:0`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 16000);
}
setInterval(spawnFloatie, 1200);
for (let i = 0; i < 6; i++) setTimeout(spawnFloatie, i * 400);

/* ===== DECO STARS ===== */
function initDecoStars() {
  const stars = ['★','✦','✧','·','•'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'deco-star';
    const size = 8 + Math.random() * 18;
    el.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;font-size:${size}px;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    el.textContent = stars[Math.floor(Math.random() * stars.length)];
    document.body.appendChild(el);
  }
}
initDecoStars();

/* ===== AUDIO ===== */
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, dur, type='sine', vol=0.25, delay=0) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    const t = ac.currentTime + delay;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e) {}
}
function playSuccess() {
  [523,659,784,1047].forEach((f,i) => tone(f, 0.3, 'sine', 0.25, i*0.1));
}
function playWrong() {
  tone(220, 0.15, 'sawtooth', 0.2);
  tone(180, 0.3, 'sawtooth', 0.15, 0.15);
}
function playPerfect() {
  [523,659,784,1047,1319,1568].forEach((f,i) => tone(f, 0.5, 'sine', 0.3, i*0.08));
  setTimeout(() => [1047,1319,1568,2093].forEach((f,i) => tone(f, 0.6, 'sine', 0.25, i*0.1)), 700);
}
function playClick() { tone(600, 0.07, 'sine', 0.12); }

/* ===== NUMPAD ===== */
function npPress(d) {
  const inp = document.getElementById('ans-input');
  if (inp.value.length < 6) inp.value += d;
  tone(700 + parseInt(d)*30, 0.05, 'sine', 0.08);
}
function npDel() {
  const inp = document.getElementById('ans-input');
  inp.value = inp.value.slice(0, -1);
  tone(400, 0.05, 'sine', 0.08);
}

/* ===== GAME STATE ===== */
let questions = [], curQ = 0, score = 0, op = '', history = [];

const opNames = { add:'חיבור', sub:'חיסור', mul:'כפל', div:'חילוק' };
const praise  = ['מעולה! 🌟','וואו! ✨','נכון! 💖','כל הכבוד! 🎀','מדהים! 🦄','פנטסטי! 🌈','יופי! 💫','אחלה! 🎉','סופר! 🍭','מושלם! 💎'];
const wrongs  = ['כמעט! 💪','לא נורא, הלאה!','תנסי שוב בפעם הבאה!','ממשיכים קדימה! 🌸'];

function rnd(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }

const LTR = '‪', PDF = '‬';
function ltr(s) { return LTR + s + PDF; }

function genQuestions(o) {
  const qs = [];
  for (let i=0; i<10; i++) {
    let a, b, q, ans;
    if (o==='add') {
      a = rnd(10, 900); b = rnd(10, Math.min(990, 1000-a));
      q = ltr(`${a} + ${b} = ?`); ans = a+b;
    } else if (o==='sub') {
      a = rnd(50, 1000); b = rnd(1, a);
      q = ltr(`${a} − ${b} = ?`); ans = a-b;
    } else if (o==='mul') {
      a = rnd(1,10); b = rnd(1,10);
      q = ltr(`${a} × ${b} = ?`); ans = a*b;
    } else {
      a = rnd(1,10); b = rnd(1,10);
      q = ltr(`${a*b} ÷ ${a} = ?`); ans = b;
    }
    qs.push({q,ans});
  }
  return qs;
}

/* ===== SCREEN NAV ===== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(() => el.classList.add('active'));
}

/* ===== GAME FLOW ===== */
function startGame(o) {
  playClick();
  op = o; questions = genQuestions(o); curQ = 0; score = 0; history = [];
  showScreen('game-screen');
  renderQ();
}

function renderQ() {
  const q = questions[curQ];
  const el = document.getElementById('q-text');
  el.style.animation = 'none';
  requestAnimationFrame(() => { el.style.animation = ''; el.textContent = q.q; });
  document.getElementById('q-label').textContent = `שאלה ${curQ+1} מתוך 10`;
  const pct = Math.round((curQ+1)/10*100);
  document.getElementById('q-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('score-live').textContent = score;
  const inp = document.getElementById('ans-input');
  inp.value = '';
  // Don't auto-focus on mobile (avoids keyboard covering numpad)
}

function checkAnswer() {
  const val = parseInt(document.getElementById('ans-input').value, 10);
  if (isNaN(val)) return;
  const correct = questions[curQ].ans;
  const ok = val === correct;
  history.push({q: questions[curQ].q, ans: correct, user: val, ok});

  if (ok) { score++; playSuccess(); showFeedback(true); spawnConfetti(22); spawnSparks(); }
  else     { playWrong(); showFeedback(false, correct); shakeCard(); }

  setTimeout(() => {
    hideFeedback();
    curQ++;
    if (curQ < 10) renderQ();
    else showScoreScreen();
  }, 1700);
}

document.getElementById('ans-input').addEventListener('keydown', e => { if (e.key==='Enter') checkAnswer(); });

/* ===== FEEDBACK ===== */
function showFeedback(ok, correct) {
  const ov = document.getElementById('fb-overlay');
  const bb = document.getElementById('fb-bubble');
  const icons_ok  = ['🌟','⭐','💖','🦄','🎀','✨','🍭','💎','🌈','🦋'];
  const icons_bad = ['😅','🤔','💪','😬','🌸'];
  document.getElementById('fb-icon').textContent = ok
    ? icons_ok[Math.floor(Math.random()*icons_ok.length)]
    : icons_bad[Math.floor(Math.random()*icons_bad.length)];
  document.getElementById('fb-main').textContent = ok
    ? praise[Math.floor(Math.random()*praise.length)]
    : wrongs[Math.floor(Math.random()*wrongs.length)];
  document.getElementById('fb-sub').textContent = ok ? '' : `התשובה הנכונה: ${correct}`;
  bb.className = 'fb-bubble ' + (ok ? 'correct' : 'wrong');
  ov.classList.add('show');
}
function hideFeedback() { document.getElementById('fb-overlay').classList.remove('show'); }

/* ===== PARTICLES ===== */
function spawnConfetti(n) {
  const colors = ['#f472b6','#a855f7','#38bdf8','#34d399','#fbbf24','#f87171','#818cf8','#fb923c'];
  for (let i=0; i<n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      const size = 7+Math.random()*10;
      el.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${size}px;height:${size}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.4+Math.random()*1.2}s;animation-delay:${Math.random()*0.4}s`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }, i*35);
  }
}
function spawnSparks() {
  const emojis = ['⭐','✨','💫','🌟','💖','🎉','🎀','🦄','🌈'];
  for (let i=0; i<8; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    const angle = Math.random()*Math.PI*2, dist = 90+Math.random()*140;
    el.style.cssText = `left:${25+Math.random()*50}vw;top:${30+Math.random()*25}vh;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px`;
    el.textContent = emojis[~~(Math.random()*emojis.length)];
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

/* ===== SHAKE ===== */
function shakeCard() {
  const c = document.getElementById('q-card');
  c.classList.remove('shaking');
  void c.offsetWidth;
  c.classList.add('shaking');
  setTimeout(() => c.classList.remove('shaking'), 500);
}

/* ===== SCORE SCREEN ===== */
function showScoreScreen() {
  showScreen('score-screen');
  document.getElementById('score-num').textContent = `${score}/10`;

  let trophy, title, msg, color;
  if (score===10)     { trophy='🏆✨';  title='מושלם לחלוטין!'; msg='את ממש קוסמת מתמטיקה! 🦄'; color='#fbbf24'; playPerfect(); spawnConfetti(70); }
  else if (score>=8)  { trophy='🌟⭐';  title='כל הכבוד!';       msg='נהדר מאוד! כמעט שלמות!';   color='#f9a8d4'; playSuccess(); spawnConfetti(35); }
  else if (score>=6)  { trophy='😊💪';  title='טוב מאוד!';       msg='קצת תרגול ותגיעי לשלמות!'; color='#67e8f9'; playSuccess(); }
  else if (score>=4)  { trophy='🌸💪';  title='ממשיכים!';        msg='לא רע! עוד קצת ותהיי אלופה!';color='#6ee7b7'; }
  else                { trophy='💪🌸';  title='מתרגלים!';        msg='אל תתייאשי! תרגול עושה מאסטר!';color='#c084fc'; }

  document.getElementById('trophy-icon').textContent = trophy;
  document.getElementById('score-title').textContent = title;
  document.getElementById('score-num').style.color = color;
  document.getElementById('score-num').style.textShadow = `0 0 30px ${color}`;
  document.getElementById('score-msg').textContent = msg;

  const list = document.getElementById('review-list');
  list.innerHTML = '';
  history.forEach(h => {
    const d = document.createElement('div');
    d.className = 'rv-item ' + (h.ok?'ok':'bad');
    const qDisplay = h.q.replace('= ?','=');
    d.innerHTML = `<span>${h.ok?'✅':'❌'}</span><span class="rv-q">${qDisplay}</span><span class="rv-ans">${h.ans}</span>`;
    list.appendChild(d);
  });

  document.getElementById('again-btn').textContent = `עוד ${opNames[op]}! 🎉`;
}

function playAgain() { playClick(); startGame(op); }

function goHome() {
  playClick();
  hideFeedback();
  showScreen('menu-screen');
}

/* ===== INIT ===== */
showScreen('menu-screen');
</script>
</body>
</html>
